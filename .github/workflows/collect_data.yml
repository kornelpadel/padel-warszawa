name: Collect Padel Court Data

on:
  schedule:
    # Co 2 godziny: 06:00–20:00 Warsaw (CEST=UTC+2)
    # UTC:           04  06  08  10  12  14  16  18
    # Warsaw lato:   06  08  10  12  14  16  18  20
    - cron: '0 4,6,8,10,12,14,16,18 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repozytorium
        uses: actions/checkout@v4

      - name: Ustaw Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Zainstaluj zależności
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Uruchom scraper
        env:
          KLUBYORG_EMAIL: ${{ secrets.KLUBYORG_EMAIL }}
          KLUBYORG_PASSWORD: ${{ secrets.KLUBYORG_PASSWORD }}
        run: python scraper.py

      - name: Zapisz dane do repozytorium
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add padel_warszawa.db csv_exports/
          git diff --staged --quiet || git commit -m \
            "data: automatyczny eksport $(date -u +'%Y-%m-%d')"
          git push
